name: ride-saga

x-service-env: &service-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  SCHEMA_REGISTRY_URL: http://schema-registry:8081
  OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
  # cap the heap: without it each of the 7 JVMs in this stack claims ~25% of host
  # memory and the stack thrashes on small machines (e.g. CI runners)
  JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m

services:
  kafka:
    image: apache/kafka:4.1.0
    ports:
      - "9092:9092" # host access for demo tooling
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:29093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      KAFKA_HEAP_OPTS: -Xms256m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  schema-registry:
    image: confluentinc/cp-schema-registry:8.0.0
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      # same rule the contracts module tests in CI
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: backward
      SCHEMA_REGISTRY_HEAP_OPTS: -Xms128m -Xmx256m
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ridesaga
      POSTGRES_PASSWORD: ridesaga
      POSTGRES_DB: booking
    volumes:
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridesaga -d booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    image: ride-saga/booking-service:local
    depends_on:
      kafka: { condition: service_healthy }
      schema-registry: { condition: service_healthy }
      postgres: { condition: service_healthy }
    ports:
      - "8080:8080"
    environment:
      <<: *service-env
      POSTGRES_HOST: postgres

  driver-matching-service:
    build:
      context: .
      dockerfile: services/driver-matching-service/Dockerfile
    image: ride-saga/driver-matching-service:local
    depends_on:
      kafka: { condition: service_healthy }
      schema-registry: { condition: service_healthy }
    ports:
      - "8082:8080"
    environment:
      <<: *service-env
      DRIVER_POOL_SIZE: 5

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    image: ride-saga/payment-service:local
    depends_on:
      kafka: { condition: service_healthy }
      schema-registry: { condition: service_healthy }
      postgres: { condition: service_healthy }
    ports:
      - "8083:8080"
    environment:
      <<: *service-env
      POSTGRES_HOST: postgres

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    image: ride-saga/notification-service:local
    depends_on:
      kafka: { condition: service_healthy }
      schema-registry: { condition: service_healthy }
    ports:
      - "8084:8080"
    environment:
      <<: *service-env

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.135.0
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./docker/otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./docker/tempo.yml:/etc/tempo.yml:ro
    ports:
      - "3200:3200"

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      # demo-only: no login wall
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:v1.3.0
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ride-saga
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      JAVA_OPTS: -Xms128m -Xmx320m
    depends_on:
      kafka:
        condition: service_healthy
