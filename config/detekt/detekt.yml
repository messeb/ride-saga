build:
  maxIssues: 0

style:
  MagicNumber:
    active: false
  MaxLineLength:
    # keep in sync with .editorconfig / ktlint
    maxLineLength: 140
  ReturnCount:
    max: 3

performance:
  SpreadOperator:
    # idiomatic Spring Boot Kotlin: runApplication<App>(*args)
    active: false

complexity:
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8
