name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build, lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build, lint and test (incl. schema compatibility gate)
        run: ./gradlew build

      - name: Upload boot jars
        uses: actions/upload-artifact@v4
        with:
          name: boot-jars
          path: services/*/build/libs/app.jar
          retention-days: 1

  docker:
    name: Validate Dockerfile (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        service:
          - booking-service
          - driver-matching-service
          - payment-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Download boot jars
        uses: actions/download-artifact@v8
        with:
          name: boot-jars
          path: services

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  e2e:
    name: End-to-end smoke test
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run e2e against the compose stack
        run: ./scripts/e2e.sh
