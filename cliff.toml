# git-cliff configuration — https://git-cliff.org/docs/configuration
[changelog]
header = "# Changelog\n\n"
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^docs", group = "<!-- 2 -->📚 Documentation" },
  { message = "^refactor", group = "<!-- 3 -->🚜 Refactoring" },
  { message = "^test", group = "<!-- 4 -->🧪 Testing" },
  { message = "^build|^ci", group = "<!-- 5 -->🏗️ Build & CI" },
  { message = "^chore", group = "<!-- 6 -->🧹 Chores" },
  { message = ".*", group = "<!-- 7 -->Other" },
]
